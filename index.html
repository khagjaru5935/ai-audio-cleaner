<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AI Audio Cleaner</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@shren/rnnoise-wasm@1.0.1/dist/rnnoise.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #222; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; text-align: center; }
        #waveform { background: #333; margin: 20px 0; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Cleaner</h1>
        <input type="file" id="audioInput" accept="audio/*">
        <div id="waveform"></div>
        <button onclick="process()">เริ่มลบ Noise</button>
        <p id="status">รอไฟล์...</p>
    </div>

    <script>
        const ws = WaveSurfer.create({ container: '#waveform', waveColor: 'blue' });
        
        async function process() {
            document.getElementById('status').innerText = "กำลังประมวลผล...";
            const rnnoise = await Rnnoise.create();
            const input = ws.getDecodedData().getChannelData(0);
            const output = new Float32Array(input.length);
            
            // ประมวลผลแบบหั่นส่วน
            const chunk = 48000 * 5; 
            for(let i=0; i<input.length; i+=chunk) {
                const slice = input.slice(i, i+chunk);
                output.set(await rnnoise.process(slice), i);
                document.getElementById('status').innerText = Math.round(i/input.length * 100) + "%";
            }
            alert("เสร็จแล้ว!");
        }

        document.getElementById('audioInput').onchange = (e) => {
            ws.load(URL.createObjectURL(e.target.files[0]));
        };
    </script>
</body>
</html>
