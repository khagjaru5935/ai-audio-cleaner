<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AI Audio Cleaner - Simple & Working</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@shren/rnnoise-wasm@1.0.1/dist/rnnoise.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        .container { background: #222; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #444; }
        #waveform { background: #000; margin: 20px 0; border-radius: 5px; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-play { background: #00adb5; color: white; }
        .btn-clean { background: #ff5722; color: white; }
        button:disabled { opacity: 0.3; }
        #status { color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Audio Cleaner</h2>
    <input type="file" id="audioInput" accept="audio/*">
    <div id="waveform"></div>
    
    <div class="controls">
        <button id="btnPlay" class="btn-play" disabled>Play / Pause</button>
        <button id="btnClean" class="btn-clean" disabled>เริ่มลบ Noise</button>
    </div>
    
    <div id="status">เลือกไฟล์ mp3 เพื่อเริ่ม</div>
</div>

<script>
    // 1. สร้างเครื่องเล่นเสียงแบบง่าย
    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#00adb5',
        progressColor: '#eeeeee',
        height: 100
    });

    const status = document.getElementById('status');
    const btnPlay = document.getElementById('btnPlay');
    const btnClean = document.getElementById('btnClean');

    // 2. เมื่อเลือกไฟล์
    document.getElementById('audioInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            status.innerText = "โหลดไฟล์...";
            ws.load(URL.createObjectURL(file));
        }
    };

    // 3. เมื่อเครื่องเล่นพร้อม
    ws.on('ready', () => {
        status.innerText = "พร้อมแล้ว";
        btnPlay.disabled = false;
        btnClean.disabled = false;
    });

    // 4. ปุ่ม Play/Pause
    btnPlay.onclick = () => ws.playPause();

    // 5. ปุ่มลบ Noise (ใช้ Logic แบบเรียบง่ายที่สุด)
    btnClean.onclick = async () => {
        try {
            btnClean.disabled = true;
            status.innerText = "กำลังเรียก AI...";
            
            const rnnoise = await Rnnoise.create();
            const originalBuffer = ws.getDecodedData();
            const inputData = originalBuffer.getChannelData(0);
            
            status.innerText = "กำลังประมวลผล... (รอสักครู่)";
            
            // ประมวลผลลบ Noise (ใช้แบบก้อนเดียวตามตัวที่เคยรันผ่าน)
            const processed = await rnnoise.process(inputData);
            
            // สร้างไฟล์ใหม่ใส่กลับในเครื่องเล่น
            const audioCtx = new AudioContext();
            const newBuffer = audioCtx.createBuffer(1, processed.length, originalBuffer.sampleRate);
            newBuffer.copyToChannel(processed, 0);
            
            ws.loadDecodedBuffer(newBuffer);
            status.innerText = "เสร็จเรียบร้อย!";
            btnClean.disabled = false;

        } catch (e) {
            console.error(e);
            status.innerText = "เกิดข้อผิดพลาด: เบราว์เซอร์บล็อกการทำงาน";
            btnClean.disabled = false;
        }
    };
</script>

</body>
</html>
