<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Cleaner - Standard PRO</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@shren/rnnoise-wasm@1.0.1/dist/rnnoise.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 550px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; font-size: 1.5rem; margin-bottom: 20px; }
        .upload-section { border: 2px dashed #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #waveform { background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 20px; min-height: 100px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #38bdf8; color: #0f172a; }
        .btn-clean { background: #f59e0b; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Audio Cleaner</h1>
    
    <div class="upload-section">
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div id="waveform"></div>

    <div class="btn-group">
        <button id="btnPlay" class="btn-play" disabled>⏯️ เล่น / หยุด</button>
        <button id="btnClean" class="btn-clean" disabled>✨ ลบ Noise</button>
    </div>

    <div id="status">รอเลือกไฟล์เสียง...</div>
</div>

<script>
    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#38bdf8',
        progressColor: '#0ea5e9',
        height: 100,
        responsive: true
    });

    const status = document.getElementById('status');
    const btnPlay = document.getElementById('btnPlay');
    const btnClean = document.getElementById('btnClean');
    let originalBuffer = null;

    document.getElementById('audioInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            status.innerText = "⌛ กำลังถอดรหัสไฟล์...";
            ws.load(URL.createObjectURL(file));
        }
    };

    ws.on('ready', () => {
        originalBuffer = ws.getDecodedData();
        status.innerText = "✅ พร้อมทำงาน";
        btnPlay.disabled = false;
        btnClean.disabled = false;
    });

    btnPlay.onclick = () => ws.playPause();

    btnClean.onclick = async () => {
        try {
            btnClean.disabled = true;
            status.innerText = "⏳ กำลังเรียก AI (โปรดรอสักครู่)...";
            
            const rnnoise = await Rnnoise.create();
            const input = originalBuffer.getChannelData(0);
            
            status.innerText = "🚀 กำลังประมวลผล...";
            const processed = await rnnoise.process(input);
            
            const audioCtx = new AudioContext();
            const newBuffer = audioCtx.createBuffer(1, processed.length, originalBuffer.sampleRate);
            newBuffer.copyToChannel(processed, 0);
            
            ws.loadDecodedBuffer(newBuffer);
            status.innerText = "✨ ลบเสียงรบกวนสำเร็จ!";
            btnClean.disabled = false;
        } catch (e) {
            status.innerText = "❌ Browser บล็อกการรัน AI (แนะนำให้ใช้ Chrome)";
            btnClean.disabled = false;
        }
    };
</script>

</body>
</html>
